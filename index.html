<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SysEduBench — Systems Education in the AI Era</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,500;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="data.js"></script>
<style>
:root{
  --acc:#2952a3;--acc2:#4a7fd4;
  --acc-soft:rgba(41,82,163,.08);--acc-border:rgba(41,82,163,.2);
  --bg:#f8f8f5;--surf:#fff;--surf2:#f2f2ee;--surf3:#eaeae5;
  --brd:#e0e0d8;--brd2:#d0d0c8;
  --tx:#18181a;--tx2:#5c5c60;--tx3:#9c9c9e;
  --pass:#166534;--pass-bg:#dcfce7;
  --fail:#991b1b;--fail-bg:#fee2e2;
  --warn:#92400e;--warn-bg:#fef3c7;
  --coming:#6b6b62;--coming-bg:#f2f2ee;
  --r:10px;--rf:14px;
  --serif:'Source Serif 4',Georgia,serif;
  --sans:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
[data-dark]{
  --bg:#0c0c0a;--surf:#121210;--surf2:#1a1a18;--surf3:#222220;
  --brd:#2a2a26;--brd2:#383834;
  --tx:#f0f0e8;--tx2:#888880;--tx3:#484844;
  --pass:#34d399;--pass-bg:rgba(52,211,153,.1);
  --fail:#f87171;--fail-bg:rgba(248,113,113,.1);
  --warn:#fbbf24;--warn-bg:rgba(251,191,36,.1);
  --coming:#6b6b62;--coming-bg:#1a1a18;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);line-height:1.6;min-height:100vh;transition:background .2s,color .2s;}
a{color:inherit;text-decoration:none;}button{font-family:inherit;cursor:pointer;}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:var(--surf);border-bottom:1px solid var(--brd);}
.nv{max-width:1160px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:58px;}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;color:var(--tx);}
.brand-logo{width:28px;height:28px;border-radius:7px;background:var(--acc);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;font-family:var(--mono);flex-shrink:0;}
.brand-name{font-size:15px;font-weight:600;letter-spacing:-.3px;}
.nav-links{display:flex;align-items:center;gap:2px;}
.nl{padding:6px 13px;border-radius:7px;font-size:13px;font-weight:500;color:var(--tx2);background:none;border:none;transition:all .15s;}
.nl:hover{color:var(--tx);background:var(--surf2);}
.nl.on{color:var(--acc);background:var(--acc-soft);}
.nav-gh{margin-left:10px;padding:7px 16px;background:var(--tx);color:var(--surf);border-radius:7px;font-size:13px;font-weight:600;border:none;display:flex;align-items:center;gap:6px;transition:opacity .15s;}
.nav-gh:hover{opacity:.82;}
.tbtn{width:32px;height:32px;border-radius:7px;background:var(--surf2);border:1px solid var(--brd);color:var(--tx2);font-size:15px;display:flex;align-items:center;justify-content:center;margin-left:8px;border:none;}
.tbtn:hover{color:var(--tx);}

/* WRAP */
.wrap{max-width:1160px;margin:0 auto;padding:0 28px;}

/* ── HOME: QUESTION SECTION ── */
.qs-slide-wrap{position:relative;min-height:240px;}
.qs-slide{position:absolute;top:0;left:0;width:100%;opacity:0;transform:translateY(12px);transition:opacity .7s ease,transform .7s ease;pointer-events:none;}
.qs-slide.active{opacity:1;transform:translateY(0);pointer-events:auto;position:relative;}
.qs-main{font-family:var(--serif);font-size:clamp(28px,3.8vw,48px);font-weight:500;letter-spacing:-1.2px;line-height:1.1;color:var(--tx);margin-bottom:16px;}
.qs-main em{font-style:italic;color:var(--acc);}
.qs-sub{font-size:15px;color:var(--tx2);line-height:1.75;max-width:520px;}
.slide-dots{display:flex;gap:6px;margin-top:28px;margin-bottom:32px;}
.slide-dot{width:6px;height:6px;border-radius:50%;background:var(--brd2);cursor:pointer;transition:all .3s;border:none;padding:0;}
.slide-dot.on{width:20px;border-radius:3px;background:var(--acc);}
.qs-inner{max-width:720px;}
.qs-eyebrow{font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--acc);margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.qs-line{width:20px;height:1.5px;background:var(--acc);}
.qs-question{font-family:var(--serif);font-size:clamp(28px,4vw,48px);font-weight:500;letter-spacing:-1.2px;line-height:1.1;margin-bottom:24px;color:var(--tx);}
.qs-question em{font-style:italic;color:var(--tx2);}
.qs-body{font-size:16px;color:var(--tx2);line-height:1.8;margin-bottom:36px;max-width:580px;}
.qs-btns{display:flex;gap:10px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border-radius:8px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .15s;}
.btn-p{background:var(--acc);color:#fff;}.btn-p:hover{opacity:.88;}
.btn-g{background:transparent;color:var(--tx);border:1px solid var(--brd);}.btn-g:hover{background:var(--surf2);}

/* ── HOME: THREE PILLARS ── */
.pillars{border-top:1px solid var(--brd);border-bottom:1px solid var(--brd);background:var(--surf);display:grid;grid-template-columns:repeat(3,1fr);}
@media(max-width:680px){.pillars{grid-template-columns:1fr;}}
.pillar{padding:32px 32px;border-right:1px solid var(--brd);}
.pillar:last-child{border-right:none;}
.pillar-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:16px;}
.pillar-title{font-size:15px;font-weight:600;margin-bottom:8px;}
.pillar-body{font-size:13px;color:var(--tx2);line-height:1.72;}

/* ── HOME: FOR WHOM ── */
.for-whom{padding:64px 0;}
.fw-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px;}
@media(max-width:680px){.fw-grid{grid-template-columns:1fr;}}
.fw-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rf);padding:28px 28px 24px;cursor:pointer;transition:all .2s;}
.fw-card:hover{border-color:var(--acc);transform:translateY(-2px);}
.fw-card-icon{font-size:24px;color:var(--acc);margin-bottom:14px;}
.fw-card-title{font-size:16px;font-weight:600;margin-bottom:8px;}
.fw-card-body{font-size:13px;color:var(--tx2);line-height:1.72;margin-bottom:16px;}
.fw-card-cta{font-size:13px;font-weight:600;color:var(--acc);display:flex;align-items:center;gap:4px;}

/* ── HOME: TWO LENSES ── */
.lenses{padding:64px 0;background:var(--surf);border-top:1px solid var(--brd);border-bottom:1px solid var(--brd);}
.lens-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:28px;}
@media(max-width:680px){.lens-grid{grid-template-columns:1fr;}}
.lens{padding:32px;background:var(--bg);}
.lens:first-child{border-radius:var(--rf) 0 0 var(--rf);border:1px solid var(--brd);border-right:none;}
.lens:last-child{border-radius:0 var(--rf) var(--rf) 0;border:1px solid var(--brd);}
@media(max-width:680px){.lens:first-child{border-radius:var(--rf) var(--rf) 0 0;border-right:1px solid var(--brd);border-bottom:none;}.lens:last-child{border-radius:0 0 var(--rf) var(--rf);}}
.lens-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:100px;margin-bottom:16px;}
.lens-tag.exam{background:rgba(41,82,163,.1);color:var(--acc);}
.lens-tag.lab{background:rgba(232,93,4,.1);color:#c2410c;}
.lens-title{font-family:var(--serif);font-size:22px;font-weight:500;margin-bottom:10px;}
.lens-body{font-size:13px;color:var(--tx2);line-height:1.75;margin-bottom:16px;}
.lens-detail{display:flex;flex-direction:column;gap:8px;}
.lens-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--tx2);}
.lens-bullet{width:5px;height:5px;border-radius:50%;background:var(--acc);flex-shrink:0;margin-top:7px;}

/* ── HOME: COURSE STRIP ── */
.course-strip{padding:56px 0;}
.cs-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px;}
.cs-tag{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surf);border:1px solid var(--brd);border-radius:8px;font-size:13px;font-weight:500;}
.cs-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cs-meta{font-size:11px;color:var(--tx3);margin-left:2px;}

/* ── HOME: ABSTRACT ── */
.abstract-sec{padding:56px 0;border-top:1px solid var(--brd);}
.abstract{font-family:var(--serif);font-size:16px;color:var(--tx);line-height:1.82;border-left:2.5px solid var(--acc);padding-left:22px;}

/* ── SECTION (shared) ── */
.sec{padding:60px 0;}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:8px;}
.sec-title{font-family:var(--serif);font-size:24px;font-weight:500;letter-spacing:-.5px;}
.sec-sub{font-size:13px;color:var(--tx2);}
.divider{border:none;border-top:1px solid var(--brd);}

/* ── SYSLAB ── */
.tier-toggle{display:inline-flex;background:var(--surf2);border:1px solid var(--brd);border-radius:8px;padding:3px;gap:2px;margin-bottom:20px;}
.tt{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:500;color:var(--tx2);border:none;background:transparent;transition:all .15s;}
.tt.on{background:var(--surf);color:var(--tx);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rf);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--surf2);}
th{padding:11px 16px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--tx2);border-bottom:1px solid var(--brd);}
th.r{text-align:right;}th.c{text-align:center;}
tbody tr{border-bottom:1px solid var(--brd);transition:background .12s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--surf2);}
td{padding:13px 16px;font-size:13.5px;vertical-align:middle;}
td.r{text-align:right;}td.c{text-align:center;}
.tname{font-weight:600;}.tsub{font-size:11px;color:var(--tx2);margin-top:1px;}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;}
.b-pass{background:var(--pass-bg);color:var(--pass);}
.b-fail{background:var(--fail-bg);color:var(--fail);}
.b-live{background:rgba(41,82,163,.12);color:var(--acc);border:1px solid var(--acc-border);}
.b-coming{background:var(--coming-bg);color:var(--coming);}
.harness-pill{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:100px;}
.hp-react{background:var(--surf3);color:var(--tx2);}
.hp-cc{background:var(--acc-soft);color:var(--acc);border:1px solid var(--acc-border);}
.prog{display:flex;align-items:center;gap:8px;justify-content:flex-end;}
.pbar{width:80px;height:4px;background:var(--surf3);border-radius:100px;overflow:hidden;flex-shrink:0;}
.pfill{height:100%;border-radius:100px;background:var(--acc);}
.pfill.hi{background:var(--fail);}
.pval{font-family:var(--mono);font-size:11px;color:var(--tx2);min-width:36px;text-align:right;}
.hm-wrap{overflow-x:auto;}
.hm{border-collapse:collapse;min-width:640px;width:100%;}
.hm th{padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--tx2);text-align:center;white-space:nowrap;background:var(--surf2);border-bottom:1px solid var(--brd);}
.hm th.left{text-align:left;padding-left:16px;}
.hm td{padding:0;height:42px;text-align:center;}
.hm td.label{padding:0 16px;font-size:12px;font-weight:600;color:var(--tx);text-align:left;white-space:nowrap;min-width:170px;background:var(--surf);}
.hm-cell{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;font-family:var(--mono);}
.hm tr{border-bottom:1px solid var(--brd);}
.hm tr:last-child{border-bottom:none;}
.course-list{display:flex;flex-direction:column;gap:8px;}
.course-item{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rf);padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s;}
.course-item:hover{border-color:var(--acc);background:var(--acc-soft);}
.course-item.active{border-color:var(--acc);background:var(--acc-soft);}
.course-item.coming{cursor:default;opacity:.6;}
.course-item.coming:hover{border-color:var(--brd);background:var(--surf);}
.ci-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ci-name{font-size:14px;font-weight:600;flex:1;}
.ci-meta{font-size:12px;color:var(--tx2);}
.domain-pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px;color:#fff;}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px;}
.mc{background:var(--surf2);border-radius:var(--r);padding:14px 16px;}
.mc-lbl{font-size:11px;color:var(--tx3);font-weight:600;letter-spacing:.7px;text-transform:uppercase;margin-bottom:6px;}
.mc-val{font-size:20px;font-weight:600;font-family:var(--mono);color:var(--tx);}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:600px){.ig{grid-template-columns:1fr;}}
.ic{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rf);padding:20px;}
.ic-title{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--tx3);margin-bottom:12px;}
.ir{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--brd);font-size:13px;}
.ir:last-child{border-bottom:none;}
.ik{color:var(--tx2);}.iv{font-weight:600;font-family:var(--mono);font-size:12px;}
.placeholder-card{background:var(--surf);border:1px dashed var(--brd2);border-radius:var(--rf);padding:48px 32px;text-align:center;}
.ph-icon{font-size:32px;color:var(--tx3);margin-bottom:16px;}
.ph-title{font-size:16px;font-weight:600;margin-bottom:8px;}
.ph-sub{font-size:13px;color:var(--tx2);line-height:1.7;max-width:420px;margin:0 auto;}
.gap-fill-exam{height:100%;border-radius:100px;background:#2952a3;}
.gap-fill-lab{height:100%;border-radius:100px;background:#e85d04;}
.cite-pre{background:var(--surf2);border:1px solid var(--brd);border-radius:8px;padding:16px 18px;font-family:var(--mono);font-size:12px;color:var(--tx2);line-height:1.9;white-space:pre-wrap;word-break:break-word;margin-top:12px;}
footer{border-top:1px solid var(--brd);padding:28px;text-align:center;font-size:13px;color:var(--tx3);}
footer a{color:var(--acc);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const {useState,useEffect,useRef}=React;
const D=window.SEB_DATA;
const DOMAIN_COLORS={os:'#2952a3',dist:'#166534',intro:'#7c3aed',db:'#92400e'};
const DOMAIN_LABELS={os:'Operating Systems',dist:'Distributed Systems',intro:'Intro to Systems',db:'Database Systems'};

function InfoTip({text}){
  const[show,setShow]=useState(false);
  const[pos,setPos]=useState({x:0,y:0});
  const btnRef=useRef();
  const handleEnter=()=>{
    if(btnRef.current){const r=btnRef.current.getBoundingClientRect();setPos({x:r.left+r.width/2,y:r.top-10});}
    setShow(true);
  };
  const bs={display:'inline-flex',alignItems:'center',justifyContent:'center',width:15,height:15,borderRadius:'50%',background:'#2952a3',color:'#fff',fontSize:10,fontWeight:800,lineHeight:1,textTransform:'none',letterSpacing:0,flexShrink:0,cursor:'help',userSelect:'none',border:'none',padding:0,fontFamily:'Georgia,serif',fontStyle:'italic'};
  return(
    <span style={{position:'relative',display:'inline-flex',alignItems:'center',marginLeft:5,verticalAlign:'middle',textTransform:'none',letterSpacing:0}}>
      <button ref={btnRef} style={bs} onMouseEnter={handleEnter} onMouseLeave={()=>setShow(false)} onFocus={handleEnter} onBlur={()=>setShow(false)} onClick={e=>{e.stopPropagation();show?setShow(false):handleEnter();}} aria-label={'Info: '+text}>i</button>
      {show&&typeof document!=='undefined'&&ReactDOM.createPortal(
        <span style={{position:'fixed',left:pos.x,top:pos.y,transform:'translate(-50%,-100%)',background:'#1a1a18',color:'#f0f0e8',fontSize:12,lineHeight:1.6,fontWeight:400,padding:'9px 12px',borderRadius:8,whiteSpace:'normal',width:220,zIndex:99999,boxShadow:'0 6px 20px rgba(0,0,0,.3)',pointerEvents:'none',textAlign:'left',fontFamily:'"Inter",system-ui,sans-serif',letterSpacing:'normal',textTransform:'none'}}>
          <span style={{position:'absolute',top:'100%',left:'50%',transform:'translateX(-50%)',width:0,height:0,borderLeft:'5px solid transparent',borderRight:'5px solid transparent',borderTop:'5px solid #1a1a18'}}/>
          {text}
        </span>,document.body
      )}
    </span>
  );
}

function useHash(def){
  const r=()=>location.hash.replace('#/','').split('/')[0]||def;
  const[v,s]=useState(r);
  useEffect(()=>{const h=()=>s(r());window.addEventListener('hashchange',h);return()=>window.removeEventListener('hashchange',h);},[]);
  return[v,id=>{location.hash='#/'+id;}];
}

// Instructor-facing: HIGH score = RED (vulnerable), LOW score = GREEN (safe)
function hmColor(val,dark){
  if(val===null||val===undefined)return dark?'#1a1a18':'#f2f2ee';
  if(val>=.95)return dark?'#3b0e0e':'#fee2e2';
  if(val>=.75)return dark?'#5c1a1a':'#fecaca';
  if(val>=.5) return dark?'#7c2d12':'#fed7aa';
  if(val>=.25)return dark?'#1c2a1a':'#dcfce7';
  return dark?'#14311e':'#bbf7d0';
}
function hmText(val,dark){
  if(val===null||val===undefined)return dark?'#484844':'#c0c0b8';
  if(val>=.75)return dark?'#fca5a5':'#991b1b';
  if(val>=.5) return dark?'#fdba74':'#9a3412';
  if(val>=.25)return dark?'#86efac':'#166534';
  return dark?'#4ade80':'#14532d';
}

const SLIDES=[
  {
    headline:<>AI broke <em>systems education.</em><br/>Let's fix it.</>,
    sub:"Students are submitting AI-generated code. Instructors don't know which assignments are vulnerable and which still require real understanding. SysEduBench was built to answer that question — rigorously.",
  },
  {
    headline:<>Which of your course<br/>assignments can AI complete?</>,
    sub:"Not hypothetically. We run AI agents on real university systems assignments, grade them with the course autograder, and show you the results — task by task, model by model.",
  },
  {
    headline:<>Course materials for the AI era<br/>need a new kind of audit.</>,
    sub:"The same assignments that challenged students for years may now be solvable in minutes. SysEduBench gives instructors a systematic way to find out — before their students do.",
  },
  {
    headline:<>Know before<br/>your students do.</>,
    sub:"AI tools are already in your classroom. SysEduBench tells you which assignments are exposed, which are resilient, and where meaningful human work still lives.",
  },
  {
    headline:<>A vulnerability scanner<br/>for your course assignments.</>,
    sub:"Every task. Every model. Graded by the same autograder your students face. SysEduBench surfaces the gaps so instructors can redesign, strengthen, or adapt their courses.",
  },
];

function HeroSlideshow(){
  const[cur,setCur]=useState(0);
  useEffect(()=>{
    const id=setInterval(()=>setCur(c=>(c+1)%SLIDES.length),4500);
    return()=>clearInterval(id);
  },[]);
  const s=SLIDES[cur];
  return<div>
    <div className="qs-slide-wrap">
      {SLIDES.map((sl,i)=><div key={i} className={'qs-slide'+(i===cur?' active':'')}>
        <h1 className="qs-main">{sl.headline}</h1>
        <p className="qs-sub">{sl.sub}</p>
      </div>)}
    </div>
    <div className="slide-dots">

function CourseDetail({course,dark}){
  const[tier,setTier]=useState(course.tiers[0].id);
  const t=course.tiers.find(tt=>tt.id===tier);
  const hasModels=t.models.length>0;
  const sorted=hasModels?[...t.models].sort((a,b)=>b.task_success-a.task_success):[];
  const best=sorted[0];
  return<div>
    <div style={{marginBottom:20}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
        <div className="domain-pill" style={{background:DOMAIN_COLORS[course.domain]}}>{DOMAIN_LABELS[course.domain]}</div>
        <span style={{fontSize:13,color:'var(--tx2)'}}>{course.institution} · {course.language} · {course.year}</span>
      </div>
      <div style={{fontSize:20,fontFamily:'var(--serif)',fontWeight:500}}>{course.name} — {course.full_name}</div>
    </div>
    {course.tiers.length>1&&<div className="tier-toggle">
      {course.tiers.map(tt=><button key={tt.id} className={'tt'+(tier===tt.id?' on':'')} onClick={()=>setTier(tt.id)}>
        {tt.id==='student'&&<span style={{marginRight:4}}>🎓</span>}{tt.label}
      </button>)}
    </div>}
    <p style={{fontSize:12,color:'var(--tx3)',marginBottom:20}}>{t.desc}</p>

    {!hasModels
      ?<div className="placeholder-card" style={{marginBottom:20}}>
          <div className="ph-icon"><i className="ti ti-loader" aria-hidden="true"/></div>
          <div className="ph-title">Model results pending</div>
          <div className="ph-sub">
            This course is enabled and the tasks are defined. Model results will appear here once the evaluation runs are complete.
            The task list below is ready.
          </div>
        </div>
      :<>
        <div className="metric-grid">
          <div className="mc"><div className="mc-lbl">Best task success</div><div className="mc-val">{Math.round(best.task_success*100)}%</div></div>
          <div className="mc"><div className="mc-lbl">Best model</div><div className="mc-val" style={{fontSize:13}}>{best.name}</div></div>
          <div className="mc"><div className="mc-lbl">Models tested</div><div className="mc-val">{t.models.length}</div></div>
          <div className="mc"><div className="mc-lbl">Tasks</div><div className="mc-val">{course.tasks.length}</div></div>
        </div>
        <div className="card" style={{marginBottom:20}}>
          <table>
            <thead><tr>
              <th>#</th><th>Model</th><th>Harness</th>
              <th className="r">Task success<InfoTip text="Fraction of tasks this model solved completely (full marks) in at least one of 3 runs."/></th>
              <th className="r">Mean score<InfoTip text="Average % of points earned across all tasks and runs. Partial credit counts."/></th>
              <th className="r">Avg turns<InfoTip text="Average agent turns per task. More turns = more debugging. Passing runs typically use fewer."/></th>
            </tr></thead>
            <tbody>
              {sorted.map((m,i)=><tr key={m.id}>
                <td style={{color:'var(--tx3)',fontFamily:'var(--mono)',fontSize:12,fontWeight:600}}>{i+1}</td>
                <td><div className="tname">{m.name}</div><div className="tsub">{m.org}</div></td>
                <td><span className={'harness-pill '+(m.harness==='Claude Code'?'hp-cc':'hp-react')}>{m.harness}</span></td>
                <td className="r"><div className="prog"><div className="pbar"><div className={'pfill'+(m.task_success>=.7?' hi':'')} style={{width:Math.round(m.task_success*100)+'%'}}/></div><span className="pval" style={{minWidth:64}}>{Math.round(m.task_success*100)}% <span style={{fontSize:10,color:'var(--tx3)'}}>({Math.round(m.task_success*course.tasks.length)}/{course.tasks.length})</span></span></div></td>
                <td className="r"><span style={{fontFamily:'var(--mono)',fontSize:12}}>{Math.round(m.mean_score*100)}%</span></td>
                <td className="r"><span style={{fontFamily:'var(--mono)',fontSize:12}}>{Math.round(m.avg_turns)}</span></td>
              </tr>)}
            </tbody>
          </table>
        </div>
        <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>Task-level heatmap{tier==='student'?' (errors excluded)':''}<InfoTip text="RED = high AI score = assignment is vulnerable. GREEN = low AI score = still requires human effort."/> <span style={{fontSize:11,color:'var(--tx3)',fontWeight:400,marginLeft:4}}>mean score per model × task (3 runs each)</span></div>
        <div className="card" style={{marginBottom:20}}>
          <div className="hm-wrap">
            <table className="hm">
              <thead><tr>
                <th className="left">Model</th>
                {course.tasks.map(t=><th key={t.id}>{t.short}</th>)}
              </tr></thead>
              <tbody>
                {sorted.map(m=><tr key={m.id}>
                  <td className="label">{m.name} <span style={{fontSize:10,color:'var(--tx3)',fontWeight:400}}>{m.org}</span></td>
                  {course.tasks.map(t=>{
                    const val=m.per_task[t.id];
                    return<td key={t.id}><div className="hm-cell" style={{background:hmColor(val,dark),color:hmText(val,dark)}}>{val!==undefined?Math.round(val*100)+'%':'—'}</div></td>;
                  })}
                </tr>)}
              </tbody>
            </table>
          </div>
        </div>
      </>
    }

    <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>Task summary<InfoTip text="Best score = highest points any model achieved. Solved by = models that earned full marks in at least one run."/></div>
    <div className="card">
      <table>
        <thead><tr>
          <th>#</th><th>Task</th><th>Topics</th>
          <th className="r">Best score<InfoTip text="Highest raw points any model scored. Partial = no model got full credit but some made progress."/></th>
          <th>Solved by<InfoTip text="Models that earned full marks (100%) in at least one run. Empty = no model solved it completely."/></th>
        </tr></thead>
        <tbody>
          {course.tasks.map((t,i)=>{
            const scored=sorted.map(m=>({model:m,raw:m.per_task[t.id]!==undefined?Math.round(m.per_task[t.id]*t.max_points):null})).filter(x=>x.raw!==null);
            const bestRaw=scored.length>0?Math.max(...scored.map(x=>x.raw)):null;
            const pct=bestRaw!==null?Math.round(bestRaw/t.max_points*100):null;
            const solvers=sorted.filter(m=>m.per_task[t.id]!==undefined&&Math.round(m.per_task[t.id]*t.max_points)===t.max_points);
            return<tr key={t.id}>
              <td style={{color:'var(--tx3)',fontFamily:'var(--mono)',fontSize:11}}>MP{i+1}</td>
              <td><div className="tname">{t.name}</div></td>
              <td style={{fontSize:12,color:'var(--tx2)'}}>{t.topics}</td>
              <td className="r">
                {bestRaw!==null
                  ?<div className="prog">
                    <div className="pbar"><div className="pfill" style={{width:pct+'%',background:pct===100?'var(--fail)':pct>=60?'#f97316':'var(--pass)'}}/></div>
                    <span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,minWidth:56,textAlign:'right',color:pct===100?'var(--fail)':pct>=60?'#c2410c':'var(--pass)'}}>{bestRaw} / {t.max_points}</span>
                  </div>
                  :<span style={{color:'var(--tx3)',fontSize:12}}>—</span>}
              </td>
              <td>
                {solvers.length===0
                  ?<span style={{fontSize:12,color:'var(--tx3)',fontStyle:'italic'}}>
                    {bestRaw!==null&&bestRaw>0?`Partial — best: ${scored.find(x=>x.raw===bestRaw)?.model.name} (${bestRaw}/${t.max_points})`:'Not solved'}
                  </span>
                  :<div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                    {solvers.map(m=><span key={m.id} style={{fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:100,background:'var(--pass-bg)',color:'var(--pass)',display:'inline-flex',alignItems:'center',gap:3}}><i className="ti ti-check" style={{fontSize:10}} aria-hidden="true"/>{m.name}</span>)}
                  </div>}
              </td>
            </tr>;
          })}
        </tbody>
      </table>
    </div>
  </div>;
}

/* ══════════════════════════════════════════════
   APP
══════════════════════════════════════════════ */
function App(){
  const[route,go]=useHash('home');
  const[dark,setDark]=useState(()=>{
    try{const s=localStorage.getItem('seb_dk');if(s!==null)return s==='1';}catch(e){}
    return window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;
  });
  useEffect(()=>{document.documentElement.toggleAttribute('data-dark',dark);try{localStorage.setItem('seb_dk',dark?'1':'0');}catch(e){};},[dark]);
  const nav=[{id:'home',l:'Home'},{id:'syslab',l:'SysLab'},{id:'sysexam',l:'SysExam'},{id:'visual',l:'How it works'}];
  return<>
    <nav className="nav">
      <div className="nv">
        <div className="brand" onClick={()=>go('home')}>
          <div className="brand-logo">SE</div>
          <span className="brand-name">SysEduBench</span>
        </div>
        <div style={{display:'flex',alignItems:'center'}}>
          <div className="nav-links">{nav.map(l=><button key={l.id} className={'nl'+(route===l.id?' on':'')} onClick={()=>go(l.id)}>{l.l}</button>)}</div>
          <a className="nav-gh" href={D.paper.github} target="_blank"><i className="ti ti-brand-github" aria-hidden="true"/>GitHub</a>
          <button className="tbtn" onClick={()=>setDark(d=>!d)} title="Toggle theme"><i className={'ti ti-'+(dark?'sun':'moon')} aria-hidden="true"/></button>
        </div>
      </div>
    </nav>
    {route==='home'   &&<HomePage go={go}/>}
    {route==='syslab' &&<SysLabPage dark={dark}/>}
    {route==='sysexam'&&<SysExamPage/>}
    {route==='visual' &&<VisualAidPage/>}
    <footer><div className="wrap">SysEduBench · <a href="https://github.com/sys-intelligence" target="_blank">sys-intelligence</a> · <a href={D.paper.arxiv_url} target="_blank">Paper</a> · <a href={D.paper.github} target="_blank">Code</a></div></footer>
  </>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
